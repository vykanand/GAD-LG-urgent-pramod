<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EAN-13 Barcode Generator</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        padding: 20px;
      }
      .barcode-card {
        display: inline-block;
        padding: 16px;
        border: 1px solid #ddd;
        text-align: center;
      }
      canvas {
        background: white;
        display: block;
        margin: 0 auto;
      }
      .controls {
        margin-top: 12px;
      }
      .code-text {
        font-size: 18px;
        letter-spacing: 4px;
        margin-top: 8px;
      }
      @media print {
        body * {
          visibility: hidden;
        }
        .print-area,
        .print-area * {
          visibility: visible;
        }
        .print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <h1>EAN-13 Barcode Generator</h1>

    <div class="barcode-card print-area" id="barcodeCard">
      <canvas
        id="barcodeCanvas"
        width="400"
        height="120"
        aria-label="EAN-13 barcode"
      ></canvas>
      <div class="code-text" id="barcodeText">Generating...</div>
      <div class="controls">
        <button id="regenerateBtn">Regenerate</button>
        <button id="printBtn">Print</button>
      </div>
    </div>

    <script>
      (function () {
        function computeEAN13Checksum(digits12) {
          // digits12: string of 12 numeric chars
          var sum = 0;
          for (var i = 0; i < 12; i++) {
            var n = parseInt(digits12.charAt(i), 10);
            // positions are 1-based from left; odd positions multiply by 1, even by 3
            sum += i % 2 === 0 ? n : n * 3;
          }
          var mod = sum % 10;
          return mod === 0 ? 0 : 10 - mod;
        }

        function random12Digits() {
          var s = "";
          for (var i = 0; i < 12; i++)
            s += Math.floor(Math.random() * 10).toString();
          return s;
        }

        var L_codes = {
          0: "0001101",
          1: "0011001",
          2: "0010011",
          3: "0111101",
          4: "0100011",
          5: "0110001",
          6: "0101111",
          7: "0111011",
          8: "0110111",
          9: "0001011",
        };
        var G_codes = {
          0: "0100111",
          1: "0110011",
          2: "0011011",
          3: "0100001",
          4: "0011101",
          5: "0111001",
          6: "0000101",
          7: "0010001",
          8: "0001001",
          9: "0010111",
        };
        var R_codes = {
          0: "1110010",
          1: "1100110",
          2: "1101100",
          3: "1000010",
          4: "1011100",
          5: "1001110",
          6: "1010000",
          7: "1000100",
          8: "1001000",
          9: "1110100",
        };
        var parityTable = {
          0: ["L", "L", "L", "L", "L", "L"],
          1: ["L", "L", "G", "L", "G", "G"],
          2: ["L", "L", "G", "G", "L", "G"],
          3: ["L", "L", "G", "G", "G", "L"],
          4: ["L", "G", "L", "L", "G", "G"],
          5: ["L", "G", "G", "L", "L", "G"],
          6: ["L", "G", "G", "G", "L", "L"],
          7: ["L", "G", "L", "G", "L", "G"],
          8: ["L", "G", "L", "G", "G", "L"],
          9: ["L", "G", "G", "L", "G", "L"],
        };

        function encodeEAN13(full13) {
          // full13: string of 13 digits
          var first = full13.charAt(0);
          var left6 = full13.slice(1, 7).split("");
          var right6 = full13.slice(7).split("");

          var pattern = "101"; // start guard

          var parity = parityTable[first];
          for (var i = 0; i < 6; i++) {
            var d = left6[i];
            if (parity[i] === "L") pattern += L_codes[d];
            else pattern += G_codes[d];
          }

          pattern += "01010"; // center guard

          for (var j = 0; j < 6; j++) pattern += R_codes[right6[j]];

          pattern += "101"; // end guard
          return pattern;
        }

        function drawBarcode(canvas, full13) {
          var ctx = canvas.getContext("2d");
          var W = canvas.width,
            H = canvas.height;
          ctx.clearRect(0, 0, W, H);
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, W, H);

          var pattern = encodeEAN13(full13);
          var modules = pattern.length; // should be 95
          var scale = Math.floor((W - 20) / modules);
          if (scale < 1) scale = 1;
          var startX = Math.round((W - modules * scale) / 2);

          // Draw bars
          for (var i = 0; i < modules; i++) {
            if (pattern.charAt(i) === "1") {
              // guards are slightly taller
              var isGuard = i < 3 || (i >= 45 && i < 50) || i >= modules - 3;
              var barH = isGuard ? Math.round(H * 0.85) : Math.round(H * 0.75);
              ctx.fillStyle = "#000";
              ctx.fillRect(startX + i * scale, 6, scale, barH);
            }
          }

          // Draw human readable text
          ctx.fillStyle = "#000";
          ctx.font = "18px Arial";
          // first digit left
          ctx.fillText(full13.charAt(0), startX - 10, H - 6);
          // left group under bars
          var leftTextX = startX + 6 * scale; // approx
          ctx.fillText(full13.slice(1, 7), leftTextX, H - 6);
          // right group
          var rightTextX = startX + (modules / 2 + 4) * scale; // approximate position after center
          ctx.fillText(full13.slice(7), rightTextX, H - 6);
        }

        function generateAndRender() {
          var d12 = random12Digits();
          var check = computeEAN13Checksum(d12);
          var full13 = d12 + check.toString();
          var canvas = document.getElementById("barcodeCanvas");
          var text = document.getElementById("barcodeText");
          drawBarcode(canvas, full13);
          text.textContent = full13;
          return full13;
        }

        document.addEventListener("DOMContentLoaded", function () {
          // auto-generate on load
          generateAndRender();

          document
            .getElementById("regenerateBtn")
            .addEventListener("click", function () {
              generateAndRender();
            });

          document
            .getElementById("printBtn")
            .addEventListener("click", function () {
              // Prefer Electron preview API when available (opens PDF preview),
              // otherwise fall back to window.print()
              try {
                if (window.electronAPI && window.electronAPI.printPreview) {
                  window.electronAPI.printPreview();
                } else {
                  window.print();
                }
              } catch (e) {
                window.print();
              }
            });
        });
      })();
    </script>
  </body>
</html>
